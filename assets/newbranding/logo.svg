<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 245" role="img" aria-labelledby="title desc">
  <title id="title">Teleno</title>
  <desc id="desc">Teleno wordmark with a monolithic Koinos node implementation subtitle.</desc>
  <defs>
    <style>
      .ink { fill: #071625; }
      .muted { fill: #7f95aa; }
      .stroke-ink { stroke: #071625; }
      .stroke-muted { stroke: #7f95aa; }
      .word { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-weight: 500; font-size: 112px; letter-spacing: 38px; }
      .tagline { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-weight: 400; font-size: 38px; letter-spacing: 1.4px; }
    </style>
  </defs>

  <g transform="translate(10 22)" fill="none" stroke-linecap="butt" stroke-linejoin="miter">
    <path class="stroke-muted" d="M 58 94 A 80 80 0 0 1 218 94" stroke-width="9"/>
    <path class="stroke-ink" d="M 6 200 L 138 68 L 270 200" stroke-width="24"/>
  </g>

  <text class="word ink" x="340" y="112">TELENO</text>
  <text class="tagline muted" x="352" y="188">A monolithic Koinos node implementation</text>
</svg>
