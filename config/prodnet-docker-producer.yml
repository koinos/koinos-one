global:
  log-level: info
  log-color: false
  log-datetime: true
  fork-algorithm: pob

chain:
  verify-blocks: true

p2p:
  listen: /ip4/0.0.0.0/tcp/8888
  seed-reconnect-interval-seconds: 60
  peer-discovery: true
  target-peer-count: 20
  max-peer-candidates: 200
  max-candidate-dials-per-cycle: 3
  peer-acquisition-interval-seconds: 5
  candidate-redial-interval-seconds: 60
  peer-log-interval-seconds: 60
  peer:
    - /ip4/46.62.204.73/tcp/8888/p2p/QmPcF1YrxamfKGpyvP6uAZcPxnmK2WUBC4K4N5ZaWky8Sh
    - /ip4/37.27.7.221/tcp/8888/p2p/QmY8NBHwoVrxBvrjS3wQoeTmWG4UUKMxmYHss7QYRXktrs
    - /ip4/95.216.68.185/tcp/8888/p2p/QmeTy5SE79ksZruNZ1DJJqR6UCe1oZvWcYaUnn6MuYE8Ea
    - /ip4/46.62.245.240/tcp/8888/p2p/QmWmxqE6WhcMWZEKwqUAbu87Qgm6JroZLdM4Xmxouu1Mmi
    - /ip4/94.130.148.114/tcp/8888/p2p/QmQ841mUuYeCtbZXdEMeKcYCx4CZydgz84zSDqWVCeJ4H8

jsonrpc:
  listen: 127.0.0.1:8080

block_producer:
  algorithm: pob
  producer: ""
  private-key-file: /data/block_producer/private.key
  resources-lower-bound: 75
  resources-upper-bound: 90
  max-inclusion-attempts: 2000
  gossip-production: true

backup:
  enabled: false
  local:
    enabled: true
    directory: /data/.teleno-native-backups/repository
    retention-count: 7

features:
  chain: true
  mempool: true
  block_store: true
  p2p: true
  jsonrpc: true
  grpc: false
  block_producer: true
  contract_meta_store: true
  transaction_store: true
  account_history: true
