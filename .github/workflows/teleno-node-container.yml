name: Teleno Node Container

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra image tag, for example beta or v0.11.0-beta.1.
        required: false
        default: ''
      push_image:
        description: Push the image to GitHub Container Registry after the smoke test.
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'node-v*'
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/teleno-node-container.yml
      - config/public-bootstrap/**
      - config/prodnet-docker-producer.yml
      - config/testnet-public-bootstrap-observer.container.yml
      - config/testnet-public-bootstrap-observer.yml
      - docker/**
      - node/teleno-node/**
      - scripts/build-cpp-libp2p-koinos.sh
      - scripts/build-gmp-static.sh
      - scripts/build-libssh-static.sh
      - scripts/build-rocksdb-zstd.sh
      - scripts/build-zstd-static.sh
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/teleno-node-container.yml
      - config/public-bootstrap/**
      - config/prodnet-docker-producer.yml
      - config/testnet-public-bootstrap-observer.container.yml
      - config/testnet-public-bootstrap-observer.yml
      - docker/**
      - node/teleno-node/**
      - scripts/build-cpp-libp2p-koinos.sh
      - scripts/build-gmp-static.sh
      - scripts/build-libssh-static.sh
      - scripts/build-rocksdb-zstd.sh
      - scripts/build-zstd-static.sh

permissions:
  contents: read
  packages: write

concurrency:
  group: teleno-node-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/teleno-node

jobs:
  build-smoke-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != '' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Resolve build date
        id: build-date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            teleno-node:ci
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.value }}
            JOBS=4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm teleno-node:ci --version
          docker run --rm teleno-node:ci --help >/tmp/teleno-node-help.txt
          grep -q -- "--backup-public-list" /tmp/teleno-node-help.txt
          docker run --rm --entrypoint teleno-prod-producer teleno-node:ci 2>/tmp/teleno-prod-producer-guard.txt && exit 1 || true
          grep -q "TELENO_ENABLE_PROD_PRODUCER=I_UNDERSTAND_MAINNET_BLOCK_PRODUCTION" /tmp/teleno-prod-producer-guard.txt

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true')
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              docker push "$tag"
            fi
          done <<< "$IMAGE_TAGS"
