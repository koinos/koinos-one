name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ============================================================
  # macOS ARM64 build
  # ============================================================
  build-mac:
    runs-on: macos-14  # Apple Silicon (M1)
    steps:
      - uses: actions/checkout@v4

      - name: Init submodules (tolerant of missing commits)
        run: |
          git submodule init
          git submodule update --recursive --depth 1 || true
          # Ensure all submodule dirs exist even if specific commits are missing
          git submodule foreach --recursive 'git checkout HEAD 2>/dev/null || true'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install macOS build dependencies
        run: |
          brew install gmp
          pip3 install cmake==3.28.4 --break-system-packages

      - name: Install npm dependencies
        run: npm ci

      - name: Build native services
        run: ./scripts/build-native-mac.sh
        timeout-minutes: 60

      - name: Stage bundle
        run: npm run stage

      - name: Build Electron app
        run: npm run build

      - name: Build macOS icon
        run: npm run build:icon:mac

      - name: Package DMG (unsigned)
        run: npx cross-env CSC_IDENTITY_AUTO_DISCOVERY=false electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  # ============================================================
  # Windows x64 build
  # ============================================================
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Init submodules (tolerant of missing commits)
        run: |
          git submodule init
          git submodule update --recursive --depth 1
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install CMake 3.28
        run: pip install cmake==3.28.4

      - name: Install npm dependencies
        run: npm ci

      - name: Build native services
        run: scripts\build-native-win.bat
        timeout-minutes: 60

      - name: Stage bundle
        run: npm run stage

      - name: Build Electron app
        run: npm run build

      - name: Package NSIS installer
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe

  # ============================================================
  # Create GitHub Release with both artifacts
  # ============================================================
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
