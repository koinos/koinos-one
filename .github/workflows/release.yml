name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create a draft GitHub release from the built artifacts.
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install macOS build dependencies
        run: |
          brew install gmp ninja
          pip3 install cmake==3.28.4 mkdocs --break-system-packages

      - name: Cache Teleno native dependencies
        uses: actions/cache@v4
        with:
          path: .deps/teleno-node
          key: teleno-node-mac-arm64-${{ hashFiles('node/teleno-node/CMakeLists.txt', 'node/teleno-node/CMakeLists.hunter.txt', 'node/teleno-node/scripts/build-*.sh') }}
          restore-keys: |
            teleno-node-mac-arm64-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Teleno node
        run: ./scripts/build-cpp-libp2p-koinos.sh
        timeout-minutes: 150

      - name: Package unsigned macOS DMG
        run: npm run package:mac:unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: teleno-mac-dmg
          path: release/*.dmg

  release:
    needs: [build-mac]
    if: github.ref_type == 'tag' || inputs.publish_release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: teleno-mac-dmg
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
