name: Unsigned macOS Package Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install macOS build dependencies
        run: |
          brew install gmp ninja
          pip3 install cmake==3.28.4 mkdocs --break-system-packages

      - name: Cache Teleno native dependencies
        uses: actions/cache@v4
        with:
          path: .deps/teleno-node
          key: teleno-node-mac-arm64-${{ hashFiles('node/teleno-node/CMakeLists.txt', 'node/teleno-node/CMakeLists.hunter.txt', 'node/teleno-node/scripts/build-*.sh') }}
          restore-keys: |
            teleno-node-mac-arm64-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Teleno node
        run: ./scripts/build-cpp-libp2p-koinos.sh
        timeout-minutes: 150

      - name: Package unsigned macOS DMG
        run: npm run package:mac:unsigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: teleno-mac-dmg
          path: release/*.dmg
