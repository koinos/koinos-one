forceCodeSigning: true
appId: io.knodel.desktop
productName: Knodel
directories:
  buildResources: assets/branding
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
mac:
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  icon: icon.icns
  notarize: true
  target:
    - dmg
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  artifactName: ${productName}-${version}-${arch}.${ext}
  icon: icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
