forceCodeSigning: false
appId: io.koinos.one.desktop
productName: Koinos One
directories:
  buildResources: assets/branding
  output: release
files:
  - dist/**
  - dist-electron/**
  - assets/branding/**
  - package.json
mac:
  artifactName: Koinos-One-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  icon: icon.icns
  notarize: true
  target:
    - dmg
dmg:
  artifactName: Koinos-One-${version}-${arch}.${ext}
win:
  artifactName: Koinos-One-${version}-${arch}.${ext}
  icon: icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: build/bundle-staging/teleno
    to: teleno
    filter:
      - "**/*"
