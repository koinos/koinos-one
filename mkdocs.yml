site_name: Koinos One Documentation
site_description: User, operator, and developer documentation for Koinos One and Teleno Node.
repo_url: https://github.com/koinos/koinos-one
docs_dir: docs/manual
site_dir: build/docs/manual-site
strict: true
use_directory_urls: false
exclude_docs: |
  prompts/**

theme:
  name: readthedocs
  navigation_depth: 4

extra_css:
  - assets/koinos-one-mkdocs.css

markdown_extensions:
  - admonition
  - fenced_code
  - sane_lists
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Koinos Concepts:
      - Overview: concepts/README.md
      - What Is Koinos?: concepts/what-is-koinos.md
      - Accounts, Keys, And Wallets: concepts/accounts-keys-wallets.md
      - Transactions, Blocks, And Finality: concepts/transactions-blocks-finality.md
      - Observers, Producers, And Mainnet: concepts/observers-producers-and-mainnet.md
  - Koinos One User Guide:
      - Overview: koinos-one/README.md
      - Install On macOS: koinos-one/install-macos.md
      - First-Run Setup: koinos-one/first-run-setup.md
      - Node Dashboard: koinos-one/node-dashboard.md
      - Syncing A Node: koinos-one/syncing-a-node.md
      - Backup And Restore: koinos-one/backup-and-restore.md
      - Public Bootstrap Restore: koinos-one/public-bootstrap-restore.md
      - Wallet And Accounts: koinos-one/wallet-and-accounts.md
      - Producer Mode: koinos-one/producer-mode.md
      - Troubleshooting: koinos-one/troubleshooting.md
  - Teleno Node CLI Guide:
      - Overview: teleno-node/README.md
      - Install Or Build: teleno-node/install-or-build.md
      - Quickstart: teleno-node/quickstart.md
      - Configuration: teleno-node/configuration.md
      - Running Observer Nodes: teleno-node/running-observer-node.md
      - Running Producer Nodes: teleno-node/running-producer-node.md
      - Backup And Restore CLI: teleno-node/backup-restore-cli.md
      - RPC Endpoints: teleno-node/rpc-endpoints.md
      - Logs And Diagnostics: teleno-node/logs-and-diagnostics.md
      - Command Reference: teleno-node/command-reference.md
      - Troubleshooting: teleno-node/troubleshooting.md
  - Developer Documentation:
